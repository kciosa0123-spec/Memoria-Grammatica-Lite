<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>文法マスター - ゲーム型学習アプリ</title>
  <style>
    /* =========================================
       大人向けスマート・カラーパレット
       ========================================= */
    :root {
      --primary: #2C3E50;       /* 深みのあるネイビー */
      --accent: #3498DB;        /* 落ち着いたブルー（ボタン等） */
      --bg-color: #F8F9FA;      /* クリーンなオフホワイト */
      --card-bg: #FFFFFF;
      --text-main: #333333;
      --text-muted: #7F8C8D;    /* 上品なグレー */
      --correct: #27AE60;       /* 落ち着いたエメラルドグリーン */
      --wrong: #E74C3C;         /* 視認性の高いレッド */
      --heart: #E74C3C;
      --combo: #F39C12;
      
      /* ヒートマップ用カラー（GitHubライク） */
      --heat-0: #EBEDF0;
      --heat-1: #9BE9A8;
      --heat-2: #40C463;
      --heat-3: #30A14E;
      --heat-4: #216E39;
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    
    body {
      margin: 0; padding: 0; background-color: var(--bg-color);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; color: var(--text-main); overflow: hidden;
    }

    #app {
      width: 100%; max-width: 600px; height: 100vh; max-height: 900px;
      background-color: var(--card-bg); display: flex; flex-direction: column;
      position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    /* =========================================
       ダッシュボード（スタート画面）
       ========================================= */
    #dashboard-screen {
      display: flex; flex-direction: column; padding: 40px 20px; height: 100%; overflow-y: auto;
    }
    .dash-header { margin-bottom: 30px; }
    .dash-header h1 { font-size: 1.8rem; color: var(--primary); margin: 0 0 5px 0; font-weight: 700; letter-spacing: 0.5px; }
    .dash-header p { font-size: 1rem; color: var(--text-muted); margin: 0; }

    /* スタッツカード */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
    .stat-card {
      background: var(--card-bg); border: 1px solid #EAEAEA; border-radius: 12px;
      padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .stat-icon { font-size: 1.5rem; display: block; margin-bottom: 5px; }
    .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); line-height: 1; }
    .stat-label { font-size: 0.85rem; color: var(--text-muted); display: block; margin-top: 5px; }

    /* ヒートマップ */
    .heatmap-card {
      background: var(--card-bg); border: 1px solid #EAEAEA; border-radius: 12px;
      padding: 20px; margin-bottom: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .heatmap-card h3 { font-size: 1rem; color: var(--primary); margin: 0 0 15px 0; }
    .heatmap-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
    }
    .heat-cell {
      aspect-ratio: 1; border-radius: 4px; background-color: var(--heat-0);
    }
    .heat-cell.lvl-1 { background-color: var(--heat-1); }
    .heat-cell.lvl-2 { background-color: var(--heat-2); }
    .heat-cell.lvl-3 { background-color: var(--heat-3); }
    .heat-cell.lvl-4 { background-color: var(--heat-4); }

    /* スタートボタン */
    .start-btn {
      background-color: var(--accent); color: white; border: none;
      padding: 18px; font-size: 1.2rem; font-weight: bold; border-radius: 12px;
      cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
      transition: transform 0.2s, box-shadow 0.2s; margin-top: auto;
    }
    .start-btn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(52, 152, 219, 0.3); }
    .start-btn:disabled { background-color: #CCC; box-shadow: none; cursor: not-allowed; }

    /* =========================================
       ゲーム画面
       ========================================= */
    #game-screen { display: none; flex-direction: column; height: 100%; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 20px; font-size: 1.1rem; font-weight: bold; border-bottom: 1px solid #EAEAEA;
    }
    .hp-hearts { color: var(--heart); letter-spacing: 2px; }
    .combo-streak { color: var(--combo); transition: transform 0.2s; font-size: 1rem; }

    .timer-container { width: 100%; height: 6px; background-color: #EAEAEA; }
    .timer-bar { height: 100%; width: 100%; background-color: var(--correct); transform-origin: left; transition: background-color 0.3s; }

    main { flex: 1; padding: 40px 20px; display: flex; flex-direction: column; }
    .question-ja { font-size: 1.2rem; font-weight: 600; margin-bottom: 30px; text-align: center; color: var(--primary); line-height: 1.5; }

    /* Sort Mode */
    .sort-area { display: flex; flex-direction: column; gap: 20px; }
    .answer-slots {
      display: flex; flex-wrap: wrap; gap: 8px; min-height: 60px;
      padding: 15px 10px; border-bottom: 2px dashed #CCC; justify-content: center;
    }
    .slot {
      padding: 8px 16px; background-color: #EDF2F7; color: var(--primary);
      border-radius: 6px; font-weight: 600; font-size: 1.05rem; cursor: pointer;
      border: 1px solid #E2E8F0;
    }
    .sort-controls { display: flex; justify-content: flex-end; gap: 10px; }
    .ctrl-btn {
      background: transparent; border: 1px solid #CBD5E0; padding: 6px 12px; border-radius: 20px;
      font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer;
    }
    .word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .word-block {
      background-color: #FFF; border: 1px solid #CBD5E0; border-bottom-width: 3px;
      padding: 10px 18px; border-radius: 8px; font-size: 1.05rem; font-weight: 600;
      cursor: pointer; user-select: none; color: var(--primary);
    }
    .word-block:active { transform: translateY(2px); border-bottom-width: 1px; margin-top: 2px; }

    .check-btn {
      background-color: var(--primary); color: white; border: none; padding: 16px;
      font-size: 1.2rem; font-weight: bold; border-radius: 12px; cursor: pointer;
      width: 100%; margin-top: 10px; box-shadow: 0 4px 10px rgba(44, 62, 80, 0.2);
    }

    /* Choice Mode */
    .choice-area { display: none; flex-direction: column; gap: 30px; justify-content: center; flex: 1;}
    .sentence-blank { font-size: 1.3rem; text-align: center; line-height: 1.6; color: var(--primary); font-weight: 500; }
    .blank { display: inline-block; width: 60px; border-bottom: 2px solid var(--primary); margin: 0 5px; }
    .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .choice-btn {
      background-color: #FFF; border: 1px solid var(--accent); border-bottom-width: 3px;
      color: var(--accent); padding: 18px 10px; border-radius: 8px;
      font-size: 1.1rem; font-weight: 600; cursor: pointer;
    }
    .choice-btn:active { transform: translateY(2px); border-bottom-width: 1px; }

    /* オートアドバンス・リザルト */
    #correct-toast {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.98); display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 20;
    }
    .toast-title { color: var(--correct); font-size: 2rem; margin-bottom: 10px; font-weight: bold; }
    .toast-progress-bg { width: 200px; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; margin-bottom: 30px; }
    .toast-progress-bar { height: 100%; background: var(--correct); width: 100%; transition: width 2.5s linear; }
    .toast-actions { display: flex; flex-direction: column; gap: 12px; width: 80%; max-width: 300px; }
    .skip-btn { background: var(--primary); color: #FFF; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    .pause-btn { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }

    #result-modal {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(44, 62, 80, 0.9); flex-direction: column; justify-content: center;
      align-items: center; padding: 20px; z-index: 30;
    }
    .modal-content { background: #FFF; width: 100%; max-width: 400px; padding: 30px 20px; border-radius: 12px; text-align: center; }
    .result-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 15px; }
    .result-correct { color: var(--correct); }
    .result-wrong { color: var(--wrong); }
    .explanation-text { font-size: 1rem; line-height: 1.6; margin: 20px 0; text-align: left; color: var(--text-main); }
    .sm2-badge { display: inline-block; background: #F1F5F9; padding: 4px 10px; border-radius: 4px; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; font-weight: 600;}
    .next-review-badge { display: inline-block; background: #E0F2FE; color: var(--accent); padding: 4px 10px; border-radius: 4px; font-size: 0.85rem; font-weight:600; margin-bottom: 20px; }
    .next-btn { background: var(--accent); color: #FFF; border: none; padding: 15px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; }

    /* 学習完了画面 */
    #all-clear-screen {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-color); flex-direction: column; justify-content: center;
      align-items: center; padding: 20px; z-index: 40; text-align: center;
    }
    .clear-icon { font-size: 4rem; margin-bottom: 15px; }
    .clear-text { font-size: 1.4rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
    .clear-sub { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 30px; line-height: 1.5; }
    .reset-debug-btn { background: transparent; color: #A0AEC0; border: 1px solid #CBD5E0; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="app">
    
    <!-- =========================================
         1. ダッシュボード画面
         ========================================= -->
    <div id="dashboard-screen">
      <div class="dash-header">
        <h1>Welcome back.</h1>
        <p>あなたのペースで、確実な定着を。</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-icon">🔥</span>
          <span class="stat-value" id="dash-streak">3</span>
          <span class="stat-label">日連続学習</span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">📚</span>
          <span class="stat-value" id="dash-todays-count">-</span>
          <span class="stat-label">今日のタスク数</span>
        </div>
      </div>

      <div class="heatmap-card">
        <h3>学習ヒストリー</h3>
        <div class="heatmap-grid" id="heatmap-grid">
          <!-- JSでダミー描画 -->
        </div>
      </div>

      <button id="dash-start-btn" class="start-btn" onclick="startDailySession()">今日の学習をスタート</button>
    </div>

    <!-- =========================================
         2. メインゲーム画面
         ========================================= -->
    <div id="game-screen">
      <header>
        <div class="hp-hearts" id="hp-display">❤️❤️❤️</div>
        <div class="combo-streak" id="combo-display"></div>
      </header>
      <div class="timer-container"><div class="timer-bar" id="timer-bar"></div></div>
      
      <main>
        <div class="question-ja" id="question-text"></div>

        <div class="sort-area" id="mode-sort">
          <div class="answer-slots" id="answer-slots"></div>
          <div class="sort-controls">
            <button class="ctrl-btn" onclick="undoLastWord()">↶ 戻す</button>
            <button class="ctrl-btn" onclick="resetSort()">🗑️ リセット</button>
          </div>
          <div class="word-bank" id="word-bank"></div>
          <button id="check-sort-btn" class="check-btn hidden" onclick="checkSortAnswer()">解答を確定</button>
        </div>

        <div class="choice-area" id="mode-choice">
          <div class="sentence-blank" id="choice-sentence"></div>
          <div class="choice-grid" id="choice-grid"></div>
        </div>
      </main>
    </div>

    <!-- オーバーレイUI（トースト＆モーダル） -->
    <div id="correct-toast" class="hidden">
      <div class="toast-title">Excellent.</div>
      <div class="toast-progress-bg"><div class="toast-progress-bar" id="toast-progress-bar"></div></div>
      <div class="toast-actions">
        <button class="skip-btn" onclick="skipToNext()">次へ進む</button>
        <button class="pause-btn" onclick="cancelAutoAdvance()">解説を確認する</button>
      </div>
    </div>

    <div id="result-modal">
      <div class="modal-content">
        <div class="result-title" id="result-title"></div>
        <div class="sm2-badge" id="sm2-badge"></div>
        <div class="next-review-badge" id="next-review-badge"></div>
        <div class="explanation-text" id="explanation-text"></div>
        <button class="next-btn" onclick="nextQuestion()">次へ進む</button>
      </div>
    </div>

    <div id="all-clear-screen">
      <div class="clear-icon">☕️</div>
      <div class="clear-text">Session Complete</div>
      <div class="clear-sub">今日のタスクはすべて完了しました。<br>また明日お会いしましょう。</div>
      <button class="reset-debug-btn" onclick="clearSaveData()">[検証] 学習データをリセット</button>
    </div>

  </div>

  <script src="questions.js"></script>

  <script>
    const STORAGE_KEY = 'grammarMaster_progress';
    let todaysDeck = [];
    let currentQuestionIndex = 0;
    let hp = 3; let combo = 0;
    let currentQuestion = null;
    let selectedWords = []; let remainingWords = []; let mistakeCount = 0;
    let timerInterval; let autoAdvanceTimer; let timeLimit = 15000; let timeLeft = 15000;
    let currentSm2Score = 3; 

    // ----------------------------------------------------
    // アプリ起動・ダッシュボード構築
    // ----------------------------------------------------
    function initApp() {
      const savedData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      const now = new Date().getTime();

      // 今日のタスク抽出
      todaysDeck = quizData.filter(q => {
        const record = savedData[q.id];
        return (!record || record.nextReviewTime <= now);
      });

      // ダッシュボード更新
      document.getElementById('dash-todays-count').innerText = todaysDeck.length;
      renderDummyHeatmap();

      if (todaysDeck.length === 0) {
        document.getElementById('dash-start-btn').innerText = "今日のタスクは完了です";
        document.getElementById('dash-start-btn').disabled = true;
      }
    }

    // ダミーのヒートマップ描画
    function renderDummyHeatmap() {
      const grid = document.getElementById('heatmap-grid');
      grid.innerHTML = '';
      // 直近28日分を描画
      for (let i = 0; i < 28; i++) {
        const cell = document.createElement('div');
        cell.className = 'heat-cell';
        const rand = Math.random();
        if(rand > 0.9) cell.classList.add('lvl-4');
        else if(rand > 0.7) cell.classList.add('lvl-3');
        else if(rand > 0.5) cell.classList.add('lvl-2');
        else if(rand > 0.3) cell.classList.add('lvl-1');
        grid.appendChild(cell);
      }
    }

    // 「学習をスタート」ボタン押下時
    function startDailySession() {
      document.getElementById('dashboard-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';
      currentQuestionIndex = 0;
      updateHeader();
      loadQuestion();
    }

    // ----------------------------------------------------
    // ゲーム進行ロジック
    // ----------------------------------------------------
    function loadQuestion() {
      currentQuestion = todaysDeck[currentQuestionIndex];
      mistakeCount = 0;
      timeLimit = (currentQuestion.type === "sort") ? 3000 + (currentQuestion.words.length * 2000) : 15000;
      timeLeft = timeLimit;
      
      document.getElementById('question-text').innerText = currentQuestion.questionJa;

      if (currentQuestion.type === "sort") {
        document.getElementById('mode-sort').style.display = 'flex';
        document.getElementById('mode-choice').style.display = 'none';
        remainingWords = [...currentQuestion.words].sort(() => Math.random() - 0.5);
        selectedWords = []; renderSortBoard();
      } else {
        document.getElementById('mode-sort').style.display = 'none';
        document.getElementById('mode-choice').style.display = 'flex';
        renderChoiceBoard();
      }
      startTimer();
    }

    function startTimer() {
      clearInterval(timerInterval);
      const timerBar = document.getElementById('timer-bar');
      timerInterval = setInterval(() => {
        timeLeft -= 50; 
        if (timeLeft <= 0) {
          clearInterval(timerInterval); timeLeft = 0; timerBar.style.width = "0%";
          handleTimeUp(); return;
        }
        const percentage = (timeLeft / timeLimit) * 100;
        timerBar.style.width = percentage + "%";
        if (percentage > 50) timerBar.style.backgroundColor = "var(--correct)";
        else if (percentage > 20) timerBar.style.backgroundColor = "var(--combo)";
        else timerBar.style.backgroundColor = "var(--wrong)";
      }, 50);
    }

    // Sort処理
    function renderSortBoard() {
      const answerSlots = document.getElementById('answer-slots');
      const wordBank = document.getElementById('word-bank');
      const checkBtn = document.getElementById('check-sort-btn');
      answerSlots.innerHTML = ''; wordBank.innerHTML = '';

      selectedWords.forEach((word, index) => {
        const slot = document.createElement('div'); slot.className = 'slot'; slot.innerText = word;
        slot.onclick = () => { remainingWords.push(selectedWords.splice(index, 1)[0]); renderSortBoard(); };
        answerSlots.appendChild(slot);
      });
      remainingWords.forEach((word, index) => {
        const btn = document.createElement('button'); btn.className = 'word-block'; btn.innerText = word;
        btn.onclick = () => { selectedWords.push(remainingWords.splice(index, 1)[0]); renderSortBoard(); };
        wordBank.appendChild(btn);
      });

      if (remainingWords.length === 0 && selectedWords.length > 0) {
        wordBank.classList.add('hidden'); checkBtn.classList.remove('hidden');
      } else {
        wordBank.classList.remove('hidden'); checkBtn.classList.add('hidden');
      }
    }
    function undoLastWord() { if (selectedWords.length > 0) { remainingWords.push(selectedWords.pop()); renderSortBoard(); } }
    function resetSort() { if (selectedWords.length > 0) { remainingWords = remainingWords.concat(selectedWords); selectedWords = []; renderSortBoard(); } }
    function checkSortAnswer() {
      if (selectedWords.join(' ') === currentQuestion.correctOrder.join(' ')) handleCorrect();
      else {
        mistakeCount++; handleMistake();
        setTimeout(() => { remainingWords = [...currentQuestion.words].sort(() => Math.random() - 0.5); selectedWords = []; renderSortBoard(); }, 800);
      }
    }

    // Choice処理
    function renderChoiceBoard() {
      const sentenceDiv = document.getElementById('choice-sentence'); const grid = document.getElementById('choice-grid');
      sentenceDiv.innerHTML = currentQuestion.questionEn.replace('[   ]', '<span class="blank"></span>');
      grid.innerHTML = '';
      currentQuestion.choices.forEach(choice => {
        const btn = document.createElement('button'); btn.className = 'choice-btn'; btn.innerText = choice;
        btn.onclick = () => checkChoiceAnswer(choice); grid.appendChild(btn);
      });
    }
    function checkChoiceAnswer(selected) { if (selected === currentQuestion.correctAnswer) handleCorrect(); else { mistakeCount++; handleMistake(); } }

    // 評価・保存
    function calculateAndSaveProgress(score) {
      const savedData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      let record = savedData[currentQuestion.id] || { interval: 0, repetitions: 0 };
      let nextIntervalDays = 0;

      if (score >= 3) {
        if (record.repetitions === 0) nextIntervalDays = (score === 4) ? 3 : 1;
        else nextIntervalDays = Math.max(1, Math.round(record.interval * ((score === 4) ? 2 : 1.5)));
        record.repetitions += 1;
      } else {
        record.repetitions = 0; nextIntervalDays = 0;
      }
      record.interval = nextIntervalDays;
      
      const nextDate = new Date(); nextDate.setDate(nextDate.getDate() + nextIntervalDays);
      record.nextReviewTime = nextDate.getTime();
      savedData[currentQuestion.id] = record;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(savedData));
      return nextIntervalDays;
    }

    function handleMistake() {
      hp--; combo = 0; updateHeader();
      if (hp <= 0) { clearInterval(timerInterval); showModal(false, 1, "ゲームオーバー。再挑戦してください。"); }
    }
    function handleTimeUp() { combo = 0; mistakeCount++; updateHeader(); currentSm2Score = 1; showModal(false, currentSm2Score, currentQuestion.explanation); }

    function handleCorrect() {
      clearInterval(timerInterval); combo++; updateHeader();
      const timeRatio = timeLeft / timeLimit;
      if (mistakeCount > 0) currentSm2Score = 2; else if (timeRatio > 0.6) currentSm2Score = 4; else currentSm2Score = 3;

      const toast = document.getElementById('correct-toast'); const progressBar = document.getElementById('toast-progress-bar');
      toast.classList.remove('hidden'); progressBar.style.transition = 'none'; progressBar.style.width = '100%';
      setTimeout(() => { progressBar.style.transition = 'width 2.5s linear'; progressBar.style.width = '0%'; }, 50);
      autoAdvanceTimer = setTimeout(() => { skipToNext(); }, 2500);
    }

    function skipToNext() { clearTimeout(autoAdvanceTimer); document.getElementById('correct-toast').classList.add('hidden'); calculateAndSaveProgress(currentSm2Score); nextQuestion(); }
    function cancelAutoAdvance() { clearTimeout(autoAdvanceTimer); document.getElementById('correct-toast').classList.add('hidden'); showModal(true, currentSm2Score, currentQuestion.explanation); }

    function updateHeader() {
      document.getElementById('hp-display').innerText = '❤️'.repeat(Math.max(0, hp));
      document.getElementById('combo-display').innerText = combo > 1 ? `🔥 ${combo}` : '';
    }

    function showModal(isCorrect, sm2Score, explanation) {
      const modal = document.getElementById('result-modal'); const title = document.getElementById('result-title');
      const badge = document.getElementById('sm2-badge'); const nextReviewBadge = document.getElementById('next-review-badge');
      const text = document.getElementById('explanation-text');
      modal.style.display = 'flex'; text.innerText = explanation;

      if (hp <= 0) {
        title.innerText = "Game Over"; title.className = "result-title result-wrong";
        badge.style.display = 'none'; nextReviewBadge.style.display = 'none';
        document.querySelector('.next-btn').innerText = "リトライ"; return;
      }

      title.innerText = isCorrect ? "Excellent." : "Time Up.";
      title.className = isCorrect ? "result-title result-correct" : "result-title result-wrong";

      const nextDays = calculateAndSaveProgress(sm2Score);
      badge.style.display = 'inline-block'; nextReviewBadge.style.display = 'inline-block';
      const scoreLabels = { 1: "Re-learn", 2: "Hard", 3: "Good", 4: "Easy" };
      badge.innerText = `評価: ${scoreLabels[sm2Score]}`;
      nextReviewBadge.innerText = nextDays === 0 ? `次回復習: 今日/明日` : `次回復習: 約 ${nextDays} 日後`;
    }

    function nextQuestion() {
      document.getElementById('result-modal').style.display = 'none';
      if (hp <= 0) { currentQuestionIndex = 0; hp = 3; combo = 0; loadQuestion(); } 
      else {
        currentQuestionIndex++;
        if (currentQuestionIndex >= todaysDeck.length) {
          document.getElementById('game-screen').style.display = 'none';
          document.getElementById('all-clear-screen').style.display = 'flex';
        } else { loadQuestion(); }
      }
    }

    function clearSaveData() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

    // アプリ起動
    initApp();
  </script>
</body>
</html>
